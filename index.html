  }
};

const rateLimiter = {
  key: 'fixminbil_calls', max: 20, windowMs: 3600000,
  check() {
    const now = Date.now();
    let stored;
    try { stored = JSON.parse(localStorage.getItem(this.key) || 'null'); } catch(e) { stored = null; }
    if (!stored || now - stored.start > this.windowMs) {
      localStorage.setItem(this.key, JSON.stringify({ calls: [now], start: now }));
      return true;
    }
    const recent = stored.calls.filter(t => now - t < this.windowMs);
    if (recent.length >= this.max) return false;
    recent.push(now);
    localStorage.setItem(this.key, JSON.stringify({ calls: recent, start: stored.start }));
    return true;
  }
};

async function callClaude(systemPrompt, messages) {
  if (!rateLimiter.check()) throw new Error('rate_limit');
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({
      model: "claude-haiku-4-5-20251001",
      max_tokens: 8000,
      system: systemPrompt,
      messages
    })
  });
  if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e?.error?.message || 'HTTP ' + res.status); }
  const data = await res.json();
  const text = data.content?.map(i => i.text || "").join("") || "";
  const clean = text.replace(/^```json\s*/m, "").replace(/```\s*$/m, "").trim();
  return JSON.parse(clean);
}

function App() {
  const [lang, setLang] = useState("da");
  const [step, setStep] = useState(0);
  const [input, setInput] = useState("");
  const [carInfo, setCarInfo] = useState("");
  const [followup, setFollowup] = useState(null);
  const [answers, setAnswers] = useState({});
  const [skill, setSkill] = useState(null);
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [activeTab, setActiveTab] = useState("diagnosis");
  const [feedback, setFeedback] = useState(null);
  const topRef = useRef(null);
  const T = tr[lang];

  useEffect(() => {
    if (step > 0 && topRef.current) topRef.current.scrollIntoView({ behavior:"smooth", block:"start" });
  }, [step]);

  async function startDiagnosis() {
    if (!input.trim()) return;
    setLoading(true); setError(null);
    try {
      const msg = carInfo.trim() ? "Bil: " + carInfo.trim() + "\n\nProblem: " + input : input;
      const data = await callClaude(FOLLOWUP_PROMPT, [{ role:"user", content: msg }]);
      setFollowup(data); setAnswers({}); setStep(1);
    } catch(e) {
      setError(e.message === 'rate_limit' ? T.rateLimitError : e.message);
    } finally { setLoading(false); }
  }

  function submitAnswers() {
    const allAnswered = followup.questions.every(q => (answers[q.id] || "").trim() || (answers[q.id + "_text"] || "").trim());
    if (!allAnswered) return;
    setStep(2);
  }

  async function submitSkill(chosenSkill) {
    setSkill(chosenSkill); setLoading(true); setError(null);
    try {
      const lines = [
        carInfo.trim() ? "Bil: " + carInfo.trim() : null,
        "Problem: " + input, "",
        "Spørgsmål og svar:",
        ...followup.questions.map(q =>
          "Q: " + q.question + "\nA: " + [answers[q.id], answers[q.id + "_text"]].filter(Boolean).join(" — ")
        ),
        "", "Brugerens niveau: " + chosenSkill
      ].filter(s => s !== null);
      const data = await callClaude(DIAGNOSIS_PROMPT, [{ role:"user", content: lines.join("\n") }]);
      setResult(data); setActiveTab("diagnosis"); setStep(3);
    } catch(e) {
      setError(e.message === 'rate_limit' ? T.rateLimitError : e.message);
    } finally { setLoading(false); }
  }

  function reset() {
    setStep(0); setInput(""); setCarInfo(""); setFollowup(null);
    setAnswers({}); setSkill(null); setResult(null); setError(null); setFeedback(null);
  }

  const S = { maxWidth:680, margin:"0 auto", padding:"0 20px" };
  const sevCfg = {
    low:    { bg:"#F0FDF4", border:"#bbf7d0", text:"#15803d", icon:"✓" },
    medium: { bg:"#FFF7ED", border:"#fed7aa", text:"#c2410c", icon:"!" },
    high:   { bg:"#FEF2F2", border:"#fecaca", text:"#dc2626", icon:"!!" },
  };
  const sev = result ? (sevCfg[result.severity] || sevCfg.medium) : null;
  const diffColor = { easy:"#15803d", medium:"#c2410c", hard:"#dc2626" };
  const diffLabel = { easy:T.easyLabel, medium:T.mediumLabel, hard:T.hardLabel };
  const likelihoodLabel = { high:T.likelyLabel, medium:T.possibleLabel, low:T.unlikelyLabel };
  const likelihoodColor = { high:"#2563EB", medium:"#c2410c", low:"#94a3b8" };
  const likelihoodBg = { high:"#EEF2FF", medium:"#FFF7ED", low:"#f1f5f9" };
  const isUrgent = result && (result.severity === "high" || skill === "beginner");

  // Header
  const header = h("header", { style:{background:"white",borderBottom:"1.5px solid #e2e8f0",position:"sticky",top:0,zIndex:100} },
    h("div", { style:{...S, display:"flex",alignItems:"center",justifyContent:"space-between",height:64} },
      h("a", { href:"/", style:{textDecoration:"none",display:"flex",alignItems:"center",gap:10} },

        h("span", { style:{fontWeight:800,fontSize:20,letterSpacing:"-.03em",color:"#0f172a"} },
          "Fixminbil", h("span", { style:{color:"#2563EB"} }, ".dk")
        )
      ),
      h("div", { style:{display:"flex",alignItems:"center",gap:16} },
        h("div", { style:{fontSize:13,color:"#64748b",display:"flex",alignItems:"center",gap:6} },
          h("span", { style:{color:"#00b67a",fontWeight:700} }, "★★★★★"),
          h("span", null, "4.8 · Trustpilot")
        ),
        h("div", { style:{display:"flex",gap:4} },
          ["da","en"].map(l =>
            h("button", {
              key:l, onClick:()=>setLang(l),

  const progress = step > 0 ? h("div", { className:"fadein", style:{display:"flex",alignItems:"center",marginBottom:40} },

      h("div", { key:i, style:{display:"flex",alignItems:"center",flex:i < T.stepLabels.length-1 ? 1 : "none"} },

          h("div", {
            style:{width:34,height:34,borderRadius:"50%",background:i<=step?"#2563EB":"#e2e8f0",color:i<=step?"white":"#94a3b8",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,boxShadow:i===step?"0 0 0 5px #EEF2FF":"none",flexShrink:0,transition:"all .3s"}
          }, i < step ? "✓" : i+1),

        ),

  // Error box
  const errorBox = error ? h("div", { style:{padding:"14px 16px",background:"#FEF2F2",border:"1.5px solid #fecaca",borderRadius:10,fontSize:14,color:"#dc2626"} }, error) : null;

      h("div", { style:{display:"flex",flexDirection:"column",gap:18} },
        h("div", null,
          h("label", { style:{fontSize:12,fontWeight:600,color:"#64748b",display:"block",marginBottom:7,textTransform:"uppercase",letterSpacing:".04em"} }, T.carLabel),
          h("input", { className:"inp", value:carInfo, onChange:e=>setCarInfo(e.target.value), placeholder:T.carPlaceholder })
        ),
        h("div", null,
          h("label", { style:{fontSize:12,fontWeight:600,color:"#64748b",display:"block",marginBottom:7,textTransform:"uppercase",letterSpacing:".04em"} }, T.problemLabel),
          h("textarea", { className:"inp", value:input, onChange:e=>setInput(e.target.value), placeholder:T.placeholder, rows:5, style:{resize:"vertical",lineHeight:1.65} })

        h("button", { className:"btn-primary", onClick:startDiagnosis, disabled:loading||!input.trim() },
          loading ? [h("div", { key:"s", className:"spinner" }), T.thinking] : T.submit + " →"

    h("div", { style:{display:"flex",flexDirection:"column",gap:14} },

      [T.trust1, T.trust2, T.trust3].map((t,i) =>
        h("div", { key:i, className:"card", style:{padding:"22px 24px"} },
          h("div", { style:{color:"#f59e0b",fontSize:14,marginBottom:10,letterSpacing:2} }, "★★★★★"),
          h("p", { style:{fontSize:14,color:"#334155",lineHeight:1.7,fontStyle:"italic",marginBottom:14} }, '"' + t.text + '"'),
          h("div", { style:{display:"flex",alignItems:"center",gap:10} },
            h("div", { style:{width:34,height:34,borderRadius:"50%",background:"#EEF2FF",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,color:"#2563EB"} }, t.name.charAt(0)),
            h("div", null,
              h("div", { style:{fontSize:13,fontWeight:700,color:"#0f172a"} }, t.name),
              h("div", { style:{fontSize:12,color:"#94a3b8"} }, t.car)
            )
          )
        )
      )
    )
  ) : null;

  // STEP 1
  const step1 = step === 1 && followup ? h("div", { className:"fadein", style:{display:"flex",flexDirection:"column",gap:18} },
    h("div", { style:{padding:"16px 18px",background:"white",border:"1.5px solid #e2e8f0",borderLeft:"4px solid #2563EB",borderRadius:"0 12px 12px 0"} },
      h("div", { style:{fontSize:11,fontWeight:700,color:"#94a3b8",textTransform:"uppercase",letterSpacing:".08em",marginBottom:5} }, T.yourProblem),
      h("p", { style:{fontSize:14,color:"#334155",lineHeight:1.65} }, input),
      carInfo ? h("span", { style:{fontSize:12,color:"#2563EB",background:"#EEF2FF",padding:"3px 10px",borderRadius:5,display:"inline-block",marginTop:8,fontWeight:600} }, carInfo) : null
    ),
    h("div", { style:{padding:"16px 18px",background:"#f8fafc",border:"1.5px solid #e2e8f0",borderRadius:12,fontSize:14,color:"#555",lineHeight:1.7} }, followup.acknowledgement),
    ...followup.questions.map((q,i) =>
      h("div", { key:q.id, className:"card", style:{padding:"22px"} },
        h("div", { style:{fontWeight:600,fontSize:15,color:"#1e293b",marginBottom:q.hint?10:16,lineHeight:1.45,display:"flex",gap:10,alignItems:"flex-start"} },
          h("span", { style:{display:"inline-flex",alignItems:"center",justifyContent:"center",width:24,height:24,background:"#2563EB",color:"white",borderRadius:"50%",fontSize:11,fontWeight:700,flexShrink:0,marginTop:1} }, i+1),
          h("span", null, q.question)
        ),
        q.hint ? h("div", { style:{padding:"10px 13px",background:"#FFFBEB",border:"1.5px solid #fde68a",borderRadius:8,fontSize:13,color:"#92400e",marginBottom:14,lineHeight:1.55,display:"flex",gap:7} },
          h("span", { style:{flexShrink:0} }, "💡"), h("span", null, q.hint)
        ) : null,
        q.type === "choice" ? h("div", { style:{display:"flex",flexDirection:"column",gap:7,marginBottom:12} },
          (q.choices||[]).map(choice =>
            h("button", {
              key:choice,
              className:"choice" + (answers[q.id]===choice?" sel":""),
              onClick:()=>setAnswers(a=>({...a,[q.id]:choice}))
            }, (answers[q.id]===choice?"✓  ":"") + choice)
          )
        ) : null,
        h("textarea", {
          className:"inp",
          value: answers[q.id+"_text"]||"",
          onChange: e => setAnswers(a=>({...a,[q.id+"_text"]:e.target.value,[q.id]:q.type==="choice"?(a[q.id]||""):e.target.value})),
          placeholder: q.type==="choice" ? T.addObservations : T.yourAnswer,
          rows: q.type==="choice"?2:4,
          style:{resize:"none",lineHeight:1.65}
        })
      )
    ),
    h("button", {
      className:"btn-primary",
      onClick:submitAnswers,
      disabled:!followup.questions.every(q=>(answers[q.id]||"").trim()||(answers[q.id+"_text"]||"").trim())
    }, T.next + " →")
  ) : null;

  // STEP 2
  const step2 = step === 2 ? h("div", { className:"fadein", style:{display:"flex",flexDirection:"column",gap:14} },
    h("div", { style:{marginBottom:8} },
      h("h2", { style:{fontWeight:800,fontSize:26,letterSpacing:"-.02em",marginBottom:8} }, T.skillTitle),
      h("p", { style:{fontSize:15,color:"#64748b",lineHeight:1.6} }, T.skillSub)
    ),
    ...[
      { id:"beginner", label:T.beginner, desc:T.beginnerDesc },
      { id:"intermediate", label:T.intermediate, desc:T.intermediateDesc },
      { id:"expert", label:T.expert, desc:T.expertDesc }
    ].map(opt =>
      h("button", { key:opt.id, className:"skill-btn", onClick:()=>submitSkill(opt.id) },
        h("div", null,
          h("div", { style:{fontWeight:700,fontSize:15,color:"#1e293b",marginBottom:3} }, opt.label),
          h("div", { style:{fontSize:13,color:"#94a3b8"} }, opt.desc)
        ),
        h("span", { style:{fontSize:18,color:"#c5cee8"} }, "→")
      )
    ),
    loading ? h("div", { style:{display:"flex",alignItems:"center",gap:12,padding:"14px",color:"#555",fontSize:14} },
      h("div", { className:"spinner", style:{borderTopColor:"#2563EB",borderColor:"#e2e8f0"} }),
      T.diagnosing
    ) : null,
    errorBox
  ) : null;

  // STEP 3
  const step3 = step === 3 && result ? h("div", { className:"fadein", style:{display:"flex",flexDirection:"column",gap:14} },
    // Severity banner
    h("div", { style:{padding:"16px 18px",background:sev.bg,border:"1.5px solid "+sev.border,borderRadius:12,display:"flex",alignItems:"flex-start",gap:12} },
      h("div", { style:{width:34,height:34,borderRadius:"50%",background:sev.text,color:"white",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:800,flexShrink:0} }, sev.icon),
      h("div", null,
        h("div", { style:{fontWeight:700,color:sev.text,fontSize:11,textTransform:"uppercase",letterSpacing:".07em",marginBottom:4} }, T.severityLabel[result.severity]),
        h("div", { style:{color:"#334155",fontSize:15,lineHeight:1.6} }, result.summary)
      )
    ),
    // Safety warning
    result.safetyWarning ? h("div", { style:{padding:"13px 15px",background:"#FFFBEB",border:"1.5px solid #fde68a",borderRadius:10,fontSize:14,color:"#92400e",lineHeight:1.6,display:"flex",gap:8} },
      h("span", null, "⚠️"), h("span", null, result.safetyWarning)
    ) : null,
    // Tabs
    h("div", { style:{display:"flex",gap:4,background:"#EEF2FF",padding:5,borderRadius:12} },
      [{id:"diagnosis",label:T.diagnosis},{id:"solutions",label:T.solutions},{id:"parts",label:T.parts}].map(tab =>
        h("button", { key:tab.id, className:"tab"+(activeTab===tab.id?" active":""), onClick:()=>setActiveTab(tab.id) }, tab.label)
      )
    ),
    // Tab: Diagnosis
    activeTab === "diagnosis" ? h("div", { style:{display:"flex",flexDirection:"column",gap:10} },
      ...(result.causes||[]).map((c,i) =>
        h("div", { key:i, className:"card", style:{padding:"18px 20px",borderLeft:"4px solid "+likelihoodColor[c.likelihood]} },
          h("div", { style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8,gap:10} },
            h("div", { style:{fontWeight:700,fontSize:15,color:"#1e293b",lineHeight:1.3} }, c.title),
            h("span", { style:{fontSize:12,fontWeight:600,padding:"3px 10px",borderRadius:6,background:likelihoodBg[c.likelihood],color:likelihoodColor[c.likelihood],whiteSpace:"nowrap",flexShrink:0} }, likelihoodLabel[c.likelihood])
          ),
          h("p", { style:{color:"#555",fontSize:14,lineHeight:1.7} }, c.description)
        )
      ),
      result.professionalAdvice ? h("div", { style:{padding:"14px 16px",background:"#f8fafc",border:"1.5px solid #e2e8f0",borderRadius:10,fontSize:14,color:"#555",lineHeight:1.65} },
        h("strong", { style:{color:"#1e293b"} }, T.mechLabel), " " + result.professionalAdvice
      ) : null
    ) : null,
    // Tab: Solutions
    activeTab === "solutions" ? h("div", { style:{display:"flex",flexDirection:"column",gap:10} },
      ...(result.solutions||[]).map((s,i) =>
        h("div", { key:i, className:"card", style:{padding:"18px 20px"} },
          h("div", { style:{display:"flex",gap:12,alignItems:"flex-start"} },
            h("div", { style:{width:32,height:32,minWidth:32,background:"#2563EB",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:700,fontSize:14} }, s.step),
            h("div", { style:{flex:1} },
              h("div", { style:{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:6,marginBottom:6} },
                h("span", { style:{fontWeight:700,fontSize:14,color:"#1e293b"} }, s.title),
                h("div", { style:{display:"flex",gap:8,alignItems:"center"} },
                  s.time ? h("span", { style:{fontSize:12,color:"#94a3b8"} }, s.time) : null,
                  h("span", { style:{fontSize:12,fontWeight:600,color:diffColor[s.difficulty]} }, diffLabel[s.difficulty])
                )
              ),
              h("p", { style:{color:"#555",fontSize:14,lineHeight:1.7} }, s.description)
            )
          )
        )
      )
    ) : null,
    // Tab: Parts
    activeTab === "parts" ? h("div", { style:{display:"flex",flexDirection:"column",gap:10} },
      ...(result.parts||[]).map((part,i) => {
        const carCtx = carInfo.trim()||"";
        const shopQ = carCtx ? part.autodocQuery+" "+carCtx+" køb" : part.autodocQuery+" køb";
        const shopUrl = "https://www.google.com/search?q="+encodeURIComponent(shopQ)+"&tbm=shop";
        const ytUrl = "https://www.youtube.com/results?search_query="+encodeURIComponent(part.youtubeQuery||part.name);
        return h("div", { key:i, className:"card", style:{padding:"18px 20px"} },
          h("div", { style:{fontWeight:700,fontSize:15,color:"#1e293b",marginBottom:6} }, part.name),
          h("p", { style:{color:"#555",fontSize:14,lineHeight:1.65,marginBottom:12} }, part.description),
          carCtx ? h("div", { style:{fontSize:12,color:"#2563EB",background:"#EEF2FF",padding:"3px 10px",borderRadius:5,display:"inline-block",marginBottom:14,fontWeight:600} }, T.carCtx+" "+carCtx) : null,
          h("div", { style:{display:"flex",gap:8,flexWrap:"wrap"} },
            h("a", { href:shopUrl, target:"_blank", rel:"noreferrer", style:{display:"inline-flex",alignItems:"center",gap:6,padding:"10px 16px",background:"#2563EB",color:"white",borderRadius:8,fontSize:13,fontWeight:600,textDecoration:"none"} }, "🛒 "+T.searchParts),
            h("a", { href:ytUrl, target:"_blank", rel:"noreferrer", style:{display:"inline-flex",alignItems:"center",gap:6,padding:"10px 16px",background:"white",border:"1.5px solid #e2e8f0",color:"#333",borderRadius:8,fontSize:13,fontWeight:600,textDecoration:"none"} }, "▶ "+T.searchYoutube)
          )
        );
      })
    ) : null,
    // Autobutler CTA
    h("div", { style:{marginTop:4,padding:"26px",background:isUrgent?"linear-gradient(135deg,#0f172a,#2563EB)":"white",border:isUrgent?"none":"1.5px solid #e2e8f0",borderRadius:14} },
      isUrgent ? h("div", { style:{fontSize:11,fontWeight:700,letterSpacing:".1em",textTransform:"uppercase",color:"rgba(255,255,255,.4)",marginBottom:8} }, result.severity==="high"?"⚠ Høj alvorlighed":"Professionel hjælp") : null,
      h("div", { style:{fontWeight:800,fontSize:20,color:isUrgent?"white":"#1e293b",marginBottom:7,letterSpacing:"-.02em"} }, T.autobutlerTitle),
      h("p", { style:{fontSize:14,color:isUrgent?"rgba(255,255,255,.65)":"#64748b",marginBottom:18,lineHeight:1.6} },
        result.severity==="high" ? T.autobutlerSubHigh : skill==="beginner" ? T.autobutlerSubBeginner : T.autobutlerSub
      ),
      h("a", { href:"https://autobutler.dk?utm_source=fixminbil", target:"_blank", rel:"noreferrer",
        style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 18px",background:isUrgent?"white":"#2563EB",color:isUrgent?"#2563EB":"white",borderRadius:9,fontSize:14,fontWeight:700,textDecoration:"none"} },
        h("span", null, T.autobutlerBtn), h("span", null, "→")
      ),
      h("div", { style:{fontSize:12,color:isUrgent?"rgba(255,255,255,.3)":"#94a3b8",marginTop:10} }, "✓ "+T.autobutlerNote)
    ),
    // Feedback
    h("div", { style:{padding:"22px",background:"white",border:"1.5px solid #e2e8f0",borderRadius:12,textAlign:"center"} },
      feedback
        ? h("div", { style:{fontSize:14,color:"#555"} }, "🙏 "+T.feedbackThanks)
        : h("div", null,
            h("div", { style:{fontSize:13,color:"#94a3b8",marginBottom:12} }, T.feedbackTitle),
            h("div", { style:{display:"flex",gap:10,justifyContent:"center"} },
              h("button", { onClick:()=>setFeedback("yes"), style:{padding:"10px 22px",borderRadius:8,background:"#F0FDF4",color:"#15803d",fontWeight:600,fontSize:13,border:"1.5px solid #bbf7d0",cursor:"pointer"} }, T.feedbackYes),
              h("button", { onClick:()=>setFeedback("no"), style:{padding:"10px 22px",borderRadius:8,background:"#FEF2F2",color:"#dc2626",fontWeight:600,fontSize:13,border:"1.5px solid #fecaca",cursor:"pointer"} }, T.feedbackNo)
            )
          )
    ),
    h("button", { onClick:reset, style:{padding:"13px",background:"transparent",border:"1.5px solid #e2e8f0",color:"#94a3b8",borderRadius:10,fontSize:14,fontWeight:500,cursor:"pointer"} }, "← "+T.newSearch),
    h("div", { style:{padding:"14px 16px",background:"#f8fafc",border:"1.5px solid #e2e8f0",borderRadius:10,display:"flex",gap:8,alignItems:"flex-start"} },
      h("span", { style:{fontSize:15,flexShrink:0} }, "⚠️"),
      h("p", { style:{fontSize:12,color:"#94a3b8",lineHeight:1.7} }, T.disclaimer)
    )
  ) : null;

  // Footer
  const footer = h("footer", { style:{borderTop:"1.5px solid #e2e8f0",background:"white",padding:"28px",textAlign:"center",marginTop:40} },
    h("div", { style:{fontWeight:800,fontSize:18,color:"#0f172a",marginBottom:5} },
      "Fixminbil", h("span", { style:{color:"#2563EB"} }, ".dk")
    ),
    h("div", { style:{fontSize:13,color:"#94a3b8",marginBottom:10} }, "© 2026 · Powered by Claude AI"),
    h("p", { style:{fontSize:12,color:"#c5cee8",maxWidth:520,margin:"0 auto",lineHeight:1.65} },
      "Fixminbil.dk er en vejledende tjeneste. Vi påtager os intet ansvar for skader eller fejlreparationer. Kritiske reparationer bør altid udføres af en autoriseret mekaniker."
    )
  );

  return h("div", { style:{fontFamily:"'Inter','Helvetica Neue',Arial,sans-serif",background:"#f8fafc",minHeight:"100vh",color:"#1e293b"} },
    header,
    hero,
    h("div", { ref:topRef, style:{...S, padding: step===0 ? "0 20px 80px" : "40px 20px 80px"} },
      progress,
      step0, step1, step2, step3
    ),
    footer
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
